services:
  telegram-saucenao: # rename it if your like
    restart: unless-stopped
    image: kxxoling/telegram-saucenao:${APP_VERSION:-latest}
    environment:
      - SAUCENAO_TOKEN=${SAUCENAO_TOKEN}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
    container_name: telegram-saucenao # rename it if your like
